<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Russian Daily – 100 Essential Phrases</title>
  <meta name="description" content="Learn 100 essential Russian phrases with pronunciation, literal translations, and grammar notes.">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts: Inter (UI) + Noto Serif (Russian display) -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@700&display=swap">

  <link rel="stylesheet" href="css/style.css">

  <!-- Inline critical theme to prevent FOUC -->
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span>РУ</span>
        <span class="logo-label" style="color:var(--text);font-weight:500">Russian Daily</span>
      </div>

      <nav>
        <button class="nav-btn active" data-page="fc-page">Flashcards</button>
        <button class="nav-btn" data-page="gallery-page">Gallery</button>
      </nav>

      <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       PAGE 1 · FLASHCARDS
  ══════════════════════════════════════ -->
  <section class="page active" id="fc-page">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="tool-btn active" data-fc-sort="default">Default</button>
        <button class="tool-btn" data-fc-sort="alpha">A–Z (EN)</button>
        <button class="tool-btn" data-fc-sort="alpha-ru">А–Я (RU)</button>
        <button class="tool-btn" data-fc-sort="shuffle">Shuffle</button>
      </div>
    </div>

    <!-- Card area -->
    <div class="fc-area">
      <!-- Progress bar -->
      <div class="fc-progress-bar" role="progressbar" aria-label="Card progress">
        <div class="fc-progress-fill" id="fc-fill"></div>
      </div>

      <!-- Flip card -->
      <div class="fc-scene" id="fc-scene">
        <div class="fc-card" id="fc-card" role="button" aria-label="Flashcard — click or press Space to flip">

          <!-- Front -->
          <div class="fc-face front" id="fc-front">
            <div class="fc-header">
              <div class="fc-tag">English</div>
              <div class="fc-num"></div>
            </div>
            <div class="fc-english"></div>
            <div class="fc-hint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              Tap to reveal Russian
            </div>
          </div>

          <!-- Back -->
          <div class="fc-face back" id="fc-back">
            <div class="fc-header">
              <div class="fc-tag" style="color:var(--ru-color)">Russian</div>
              <div class="fc-num fc-num-b"></div>
            </div>
            <div class="fc-russian"></div>
            <div class="fc-pronun"></div>
            <div class="fc-literal"></div>
            <div class="fc-note"></div>
          </div>

        </div><!-- /fc-card -->
      </div><!-- /fc-scene -->

      <!-- Controls -->
      <div class="fc-controls">
        <button class="fc-nav-btn" id="fc-prev" aria-label="Previous card">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="fc-counter" id="fc-counter"></div>
        <button class="fc-nav-btn" id="fc-next" aria-label="Next card">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <p style="font-size:.73rem;color:var(--sub);text-align:center;">
        ← → arrow keys · Space / Enter to flip · swipe on mobile
      </p>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       PAGE 2 · GALLERY
  ══════════════════════════════════════ -->
  <section class="page" id="gallery-page">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="tool-btn active" data-gal-sort="default">Default</button>
        <button class="tool-btn" data-gal-sort="alpha">A–Z (EN)</button>
        <button class="tool-btn" data-gal-sort="alpha-ru">А–Я (RU)</button>
        <button class="tool-btn" data-gal-sort="shuffle">Shuffle</button>
      </div>

      <span class="count-badge" id="count-badge"></span>

      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="gallery-search" placeholder="Search cards…" aria-label="Search flashcards">
      </div>
    </div>

    <!-- Grid -->
    <div class="gallery-grid" id="gallery-grid" role="list" aria-label="Flashcard gallery"></div>
    <div class="empty-state" id="gallery-empty" style="display:none">No cards match your search.</div>

  </section>

  <footer>100 essential Russian phrases · tap any gallery card to open in Flashcard view</footer>
</div><!-- /app -->

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>

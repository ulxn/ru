<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Russian Daily – 200 Phrases & Slang</title>
  <meta name="description" content="Learn 200 Russian phrases — 100 essentials + 100 real-world slang — with pronunciation and grammar notes.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@700&display=swap">

  <link rel="stylesheet" href="style.css">

  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-ru">РУ</span>
        <span class="logo-label" style="color:var(--text);font-weight:500">Russian Daily</span>
      </div>

      <nav>
        <button class="nav-btn active" data-page="fc-page">Flashcards</button>
        <button class="nav-btn" data-page="gallery-page">Gallery</button>
      </nav>

      <!-- Monochrome SVG theme toggle -->
      <button class="theme-btn" id="theme-btn" aria-label="Toggle theme" title="Toggle dark/light">
        <!-- Moon (shown in light mode) -->
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
        <!-- Sun (shown in dark mode) -->
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       PAGE 1 · FLASHCARDS
  ══════════════════════════════════════ -->
  <section class="page active" id="fc-page">

    <div class="toolbar">
      <div class="toolbar-group">
        <button class="tool-btn active" data-fc-sort="default">Default</button>
        <button class="tool-btn" data-fc-sort="shuffle">Shuffle</button>
        <button class="tool-btn" data-fc-sort="essentials">Essentials</button>
        <button class="tool-btn" data-fc-sort="slang">Slang</button>
      </div>
    </div>

    <div class="fc-area">
      <!-- Progress -->
      <div class="fc-progress-bar" role="progressbar" aria-label="Card progress">
        <div class="fc-progress-fill" id="fc-fill"></div>
      </div>

      <!-- Flip card -->
      <div class="fc-scene" id="fc-scene">
        <div class="fc-card" id="fc-card" role="button" aria-label="Flashcard — tap to flip">

          <!-- Front -->
          <div class="fc-face front" id="fc-front">
            <div class="fc-header">
              <div class="fc-tag">English</div>
              <div class="fc-num"></div>
            </div>
            <div class="fc-category" id="fc-cat-front"></div>
            <div class="fc-english"></div>
            <div class="fc-hint">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              Tap to reveal Russian
            </div>
          </div>

          <!-- Back -->
          <div class="fc-face back" id="fc-back">
            <div class="fc-header">
              <div class="fc-tag" style="color:var(--accent)">Russian</div>
              <div class="fc-num fc-num-b"></div>
            </div>
            <div class="fc-category" id="fc-cat-back"></div>
            <div class="fc-russian"></div>
            <div class="fc-pronun"></div>
            <div class="fc-literal"></div>
            <div class="fc-note"></div>
          </div>

        </div>
      </div>

      <!-- Nav controls -->
      <div class="fc-controls">
        <button class="fc-nav-btn" id="fc-prev" aria-label="Previous card">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="fc-counter" id="fc-counter"></div>
        <button class="fc-nav-btn" id="fc-next" aria-label="Next card">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- Always show toggle -->
      <div class="fc-always-row">
        <label class="toggle-pill" title="Show both sides at once">
          <input type="checkbox" id="fc-always-toggle">
          <span class="toggle-track"></span>
        </label>
        <span class="fc-always-label">Always show translation</span>
      </div>

      <p style="font-size:.72rem;color:var(--sub);text-align:center;">
        ← → keys · Space to flip · swipe on mobile
      </p>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       PAGE 2 · GALLERY
  ══════════════════════════════════════ -->
  <section class="page" id="gallery-page">

    <div class="toolbar">
      <div class="toolbar-group">
        <button class="tool-btn active" data-gal-sort="default">Default</button>
        <button class="tool-btn" data-gal-sort="shuffle">Shuffle</button>
        <button class="tool-btn" data-gal-sort="essentials">Essentials</button>
        <button class="tool-btn" data-gal-sort="slang">Slang</button>
      </div>

      <span class="count-badge" id="count-badge"></span>

      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="gallery-search" placeholder="Search cards…" aria-label="Search flashcards">
      </div>
    </div>

    <div class="gallery-grid" id="gallery-grid" role="list" aria-label="Flashcard gallery"></div>
    <div class="empty-state" id="gallery-empty" style="display:none">No cards match your search.</div>

  </section>

  <footer>200 Russian phrases · tap any gallery card to open in Flashcard view</footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
